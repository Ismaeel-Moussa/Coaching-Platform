name: Render deployment

# This workflow observes Render's existing automatic deployment. Keep the
# Render service's Auto-Deploy setting on "On Commit" to avoid a wait cycle.

on:
  push:
    branches:
      - main
    paths:
      - "coaching-platform-backend/**"

permissions:
  contents: read
  deployments: write

concurrency:
  group: render-production
  cancel-in-progress: true

jobs:
  production:
    name: Production backend
    runs-on: ubuntu-latest
    timeout-minutes: 40
    environment:
      name: production
      url: https://coaching-platform-pp4n.onrender.com
    env:
      RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
      RENDER_SERVICE_ID: ${{ secrets.RENDER_SERVICE_ID || vars.RENDER_SERVICE_ID }}
      HEALTH_URL: https://coaching-platform-pp4n.onrender.com/api/health

    steps:
      - name: Validate Render configuration
        shell: bash
        run: |
          set -euo pipefail

          if [[ -z "${RENDER_API_KEY}" ]]; then
            echo "Missing GitHub Actions secret: RENDER_API_KEY" >&2
            exit 1
          fi

          if [[ -z "${RENDER_SERVICE_ID}" ]]; then
            echo "Missing GitHub Actions secret or repository variable: RENDER_SERVICE_ID" >&2
            exit 1
          fi

      - name: Wait for this commit on Render
        id: render
        shell: bash
        run: |
          set -euo pipefail

          api_url="https://api.render.com/v1/services/${RENDER_SERVICE_ID}/deploys?limit=20"
          deadline=$((SECONDS + 2100))
          deploy_id=""

          echo "Waiting for Render to deploy commit ${GITHUB_SHA}."

          while (( SECONDS < deadline )); do
            response="$(curl \
                --fail \
                --silent \
                --show-error \
                --retry 3 \
                --retry-all-errors \
                --connect-timeout 10 \
                --max-time 30 \
                --header "Accept: application/json" \
                --header "Authorization: Bearer ${RENDER_API_KEY}" \
                "${api_url}")"

            deploy="$(jq \
                --compact-output \
                --arg sha "${GITHUB_SHA}" \
                '[.[] | (.deploy // .) | select(.commit.id == $sha)] | sort_by(.createdAt) | last // empty' \
                <<<"${response}")"

            if [[ -z "${deploy}" ]]; then
              echo "Render has not registered this commit yet; checking again in 15 seconds."
              sleep 15
              continue
            fi

            deploy_id="$(jq --raw-output '.id' <<<"${deploy}")"
            status="$(jq --raw-output '.status' <<<"${deploy}")"
            echo "Render deploy ${deploy_id}: ${status}"

            case "${status}" in
              live)
                echo "deploy_id=${deploy_id}" >> "${GITHUB_OUTPUT}"
                echo "status=${status}" >> "${GITHUB_OUTPUT}"
                break
                ;;
              build_failed|update_failed|pre_deploy_failed|canceled|deactivated)
                echo "Render deployment failed with status '${status}'." >&2
                exit 1
                ;;
              *)
                sleep 15
                ;;
            esac
          done

          if [[ -z "${deploy_id}" ]] || [[ "${status:-}" != "live" ]]; then
            echo "Timed out waiting for Render to deploy ${GITHUB_SHA}." >&2
            exit 1
          fi

      - name: Verify production health
        shell: bash
        run: |
          set -euo pipefail

          for attempt in {1..12}; do
            if response="$(curl \
              --fail \
              --silent \
              --show-error \
              --connect-timeout 10 \
              --max-time 30 \
              "${HEALTH_URL}")" \
              && jq --exit-status \
                '.status == "healthy" and .database == "connected"' \
                <<<"${response}" >/dev/null; then
              echo "Production health check passed."
              exit 0
            fi

            echo "Health check attempt ${attempt}/12 failed; retrying in 10 seconds."
            sleep 10
          done

          echo "The Render deploy is live, but the production health check failed." >&2
          exit 1

      - name: Publish deployment summary
        if: success()
        shell: bash
        run: |
          {
            echo "### Render production deployment"
            echo ""
            echo "- Commit: \`${GITHUB_SHA}\`"
            echo "- Render deploy: \`${{ steps.render.outputs.deploy_id }}\`"
            echo "- Status: **Deployed and healthy**"
            echo "- Backend: ${HEALTH_URL%/api/health}"
          } >> "${GITHUB_STEP_SUMMARY}"
