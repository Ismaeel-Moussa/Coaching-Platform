<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <!-- Gold gradient matching the brand feel -->
    <linearGradient id="gold-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffd700" />
      <stop offset="50%" stop-color="#fdc003" />
      <stop offset="100%" stop-color="#b8860b" />
    </linearGradient>
  </defs>
  <!-- Background: Rounded square in brand navy -->
  <rect width="32" height="32" rx="7" fill="#0b132b" />
  <!-- Monogram text with the gold gradient -->
  <text x="16" y="21.5" text-anchor="middle" fill="url(#gold-grad)" font-family="'Archivo Narrow', 'Inter', 'Arial Black', sans-serif" font-weight="900" font-size="15" letter-spacing="-0.02em">JN</text>
</svg>